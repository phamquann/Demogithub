name: CI/CD Docker

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
name: Build and Push Docker Image

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        # Sử dụng secret bạn vừa tạo ở Bước 1
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          # Trỏ cố định tới file "dockerfile" (do file của bạn đang viết thường chữ "d")
          file: ./dockerfile
          push: true
          tags: quanpham12/javapro:latest

    steps:
    # 1. Lấy code
    - name: Checkout code
      uses: actions/checkout@v3

    # 2. Setup Java
    - name: Set up JDK
      uses: actions/setup-java@v5.2.0
      with:
        distribution: 'temurin'
        java-version: '17'

    # 3. Build project (tạo .jar)
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # 4. Login Docker Hub
    - name: Login Docker Hub
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}

    # 5. Build & Push Docker Image
    - name: Build and Push Docker Image
      uses: docker/build-push-action@v7.0.0
      with:
        context: .
        push: true
        tags: |
          yourusername/springboot-app:latest
          yourusername/springboot-app:${{ github.sha }}
