name: Build and Push Docker Image

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: quanpham12/javapro:latest

      - name: Deploy to DevOps Classroom
        env:
          REPO: quanpham12/javapro
          CONTAINER_PORT: 8080
          SLOT: 1
          MAX_ATTEMPTS: 3
          RETRY_DELAY_SECONDS: 15
        run: |
          DEPLOY_URL="${{ secrets.DEPLOY_URL }}?repo=${REPO}&tag=latest&slot=${SLOT}&container_port=${CONTAINER_PORT}&strict_container_port=0"
          LAST_BODY=""
          LAST_CODE="000"

          for attempt in $(seq 1 "${MAX_ATTEMPTS}"); do
            echo "Deploy attempt ${attempt}/${MAX_ATTEMPTS}"
            RESPONSE=$(curl -sS -m 90 --connect-timeout 15 -w "\n%{http_code}" -X POST "${DEPLOY_URL}" || printf "\n000")
            BODY=$(echo "${RESPONSE}" | sed '$d')
            CODE=$(echo "${RESPONSE}" | tail -n1)

            LAST_BODY="${BODY}"
            LAST_CODE="${CODE}"

            echo "Webhook HTTP: ${CODE}"

            if [ "${CODE}" -ge 200 ] && [ "${CODE}" -lt 300 ]; then
              echo "Deploy succeeded."
              echo "::group::Webhook JSON details"
              echo "${BODY}" | python3 -m json.tool 2>/dev/null || echo "${BODY}"
              echo "::endgroup::"
              exit 0
            fi

            if [ "${attempt}" -lt "${MAX_ATTEMPTS}" ]; then
              echo "Deploy attempt failed. Retrying in ${RETRY_DELAY_SECONDS}s..."
              sleep "${RETRY_DELAY_SECONDS}"
            fi
          done

          echo "Deploy failed after ${MAX_ATTEMPTS} attempts."
          echo "Last webhook HTTP: ${LAST_CODE}"
          echo "::group::Webhook JSON details"
          echo "${LAST_BODY}" | python3 -m json.tool 2>/dev/null || echo "${LAST_BODY}"
          echo "::endgroup::"
          exit 1
