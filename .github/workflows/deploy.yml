name: Build and Push Docker Image

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: quanpham12/javapro:latest

      - name: Triển khai lên DevOps Classroom
        env:
          DEPLOY_URL: ${{ secrets.DEPLOY_URL }}
        run: |
          set -e

          REPO="quanpham12/javapro"
          TAG="latest"
          SLOT="1"
          CONTAINER_PORT="80"

          echo "Bat dau deploy..."
          echo "Repo: $REPO"
          echo "Tag: $TAG"
          echo "Slot: $SLOT"
          echo "Container port: $CONTAINER_PORT"

          RESPONSE=$(curl -sS -L -w "\n%{http_code}" \
            -X POST "$DEPLOY_URL" \
            --get \
            --data-urlencode "repo=$REPO" \
            --data-urlencode "tag=$TAG" \
            --data-urlencode "slot=$SLOT" \
            --data-urlencode "container_port=$CONTAINER_PORT")

          BODY=$(echo "$RESPONSE" | sed '$d')
          CODE=$(echo "$RESPONSE" | tail -n1)

          echo "Webhook HTTP: $CODE"

          echo "::group::Chi tiet webhook JSON"
          echo "$BODY" | python3 -m json.tool 2>/dev/null || echo "$BODY"
          echo "::endgroup::"

          if [ "$CODE" -lt 200 ] || [ "$CODE" -ge 300 ]; then
            echo "Deploy that bai."
            exit 1
          fi

          echo "Deploy thanh cong."
